name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -e .
      - name: Lint with ruff
        run: pip install ruff && ruff check src/
      - name: Type check
        run: pip install mypy && mypy src/ --ignore-missing-imports || true
      - name: Test
        run: |
          pip install pytest
          if [ -d tests ]; then pytest tests/ -v; else echo "No tests directory yet"; fi

  web-build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      PUBLIC_SUPABASE_ANON_KEY: "placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd web && npm ci && npm run build
